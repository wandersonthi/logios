version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: logios_user
      POSTGRES_PASSWORD: logios_password
      POSTGRES_DB: logios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://logios_user:logios_password@db:5432/logios_db
    depends_on:
      - db

  tracking-service:
    build:
      context: .
      dockerfile: services/tracking-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=postgres://logios_user:logios_password@db:5432/logios_db
    depends_on:
      - db

volumes:
  postgres_data:
